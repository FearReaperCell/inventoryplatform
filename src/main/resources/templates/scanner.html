<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<link rel="stylesheet" href="/css/app.css">
<head>
<meta charset="UTF-8">
<title>Barcode Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Arial, sans-serif;
margin:0;
background:#f4f6f9;
}

/* Header */

.header{
background:#111827;
color:white;
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
}

.header h1{
margin:0;
font-size:20px;
}

/* Layout */

.container{
display:flex;
justify-content:center;
align-items:center;
height:calc(100vh - 70px);
}

/* Scanner Card */

.card{
background:white;
padding:35px;
border-radius:10px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
width:520px;
text-align:center;
}

.card h2{
margin-top:0;
color:#111827;
}

/* Scanner Area */

#reader{
margin-top:20px;
}

/* Result */

.result{
margin-top:20px;
font-size:18px;
font-weight:bold;
color:#111827;
}

/* Buttons */

.button{
display:inline-block;
margin-top:10px;
padding:10px 16px;
background:#111827;
color:white;
text-decoration:none;
border-radius:6px;
font-weight:bold;
}

.button:hover{
background:#1f2937;
}

</style>

</head>

<body>

<div class="header">
<h1>Inventory Management System</h1>
</div>

<div class="container">

<div class="card">

<h2>Barcode Scanner</h2>

<a class="button" href="/">Back to Dashboard</a>

<div id="reader"></div>

<p class="result">
Scanned Code: <span id="result">None</span>
</p>

</div>

</div>

<script>

function onScanSuccess(decodedText){

document.getElementById("result").innerText = decodedText;

/* send barcode to backend */

window.location.href = "/barcode/" + decodedText;

}

function onScanFailure(error){
/* ignore scan errors */
}

let scanner = new Html5QrcodeScanner(
"reader",
{
fps:10,
qrbox:250
});

scanner.render(onScanSuccess,onScanFailure);

</script>

</body>

</html>
