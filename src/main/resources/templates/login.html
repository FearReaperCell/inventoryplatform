<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Inventory Platform Login</title>

<style>

body{
font-family:Segoe UI, Arial, sans-serif;
margin:0;
background:#f4f6f9;
}

/* HEADER */

.header{
background:#111827;
color:white;
padding:18px 30px;
font-size:20px;
font-weight:600;
}

/* CENTER LOGIN */

.login-container{
display:flex;
justify-content:center;
align-items:center;
height:80vh;
}

/* LOGIN CARD */

.login-card{
background:white;
padding:40px;
width:420px;
border-radius:10px;
box-shadow:0 3px 12px rgba(0,0,0,0.08);
}

/* TITLE */

.login-card h2{
margin-top:0;
margin-bottom:25px;
font-size:22px;
}

/* FORM */

label{
font-weight:600;
font-size:14px;
display:block;
margin-bottom:5px;
}

input{
width:100%;
padding:10px;
margin-bottom:18px;
border:1px solid #ddd;
border-radius:6px;
font-size:14px;
}

/* BUTTON */

button{
width:100%;
padding:12px;
background:#111827;
color:white;
border:none;
border-radius:6px;
font-size:15px;
cursor:pointer;
}

button:hover{
background:#1f2937;
}

/* DEMO ACCOUNTS */

.demo{
margin-top:20px;
font-size:14px;
}

.demo ul{
padding-left:20px;
}

.demo code{
background:#f1f1f1;
padding:3px 6px;
border-radius:4px;
}

</style>

</head>

<body>

<div class="header">
Inventory Management System
</div>

<div class="login-container">

<div class="login-card">

<h2>Login</h2>

<form th:action="@{/login}" method="post">

<label>Username</label>
<input type="text" name="username" required>

<label>Password</label>
<input type="password" name="password" required>

<button type="submit">Login</button>

</form>

<div class="demo">

<strong>Demo Accounts</strong>

<ul>
<li><code>admin</code> / <code>admin123</code> (Admin)</li>
<li><code>employee</code> / <code>employee123</code> (Employee)</li>
</ul>

</div>

</div>

</div>

</body>
</html>
