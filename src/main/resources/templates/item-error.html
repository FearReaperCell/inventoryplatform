<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Item Error</title>

<style>

body{
font-family: Arial, sans-serif;
margin:40px;
text-align:center;
}

.box{
background:#fee2e2;
border:1px solid #ef4444;
padding:20px;
border-radius:8px;
display:inline-block;
}

button{
margin-top:20px;
padding:10px 16px;
background:#111827;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="box">

<h2>Error</h2>

<p th:text="${message}"></p>

<a href="/admin/items/new">
<button>Return to Add Item</button>
</a>

</div>

</body>

</html>
